<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Подключение в Happ</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, sans-serif; max-width: 680px; margin: 32px auto; padding: 0 16px; line-height: 1.45; }
    code { word-break: break-all; background: #f2f2f2; padding: 10px; border-radius: 8px; display: block; }
    button, a.button { display: inline-block; border: 0; border-radius: 10px; padding: 12px 16px; font-size: 16px; cursor: pointer; text-decoration: none; background: #111; color: #fff; }
  </style>
</head>
<body>
  <h1>Подключение в Happ</h1>
  <p>Если Happ не открылся автоматически, нажми кнопку ниже.</p>
  <p><a id="open" class="button" href="#">Открыть в Happ</a></p>
  <p>Обычная ссылка подписки:</p>
  <code id="sub"></code>

  <script>
    const params = new URLSearchParams(location.search);
    const subUrl = params.get('url') || '';
    const happUrl = subUrl ? `happ://add/${encodeURIComponent(subUrl)}` : '';

    document.getElementById('sub').textContent = subUrl || 'Ссылка не передана';
    const open = document.getElementById('open');
    open.href = happUrl || '#';

    if (happUrl) {
      setTimeout(() => { location.href = happUrl; }, 250);
    }
  </script>
</body>
</html>
