<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>Подключение в Happ</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0d1117; color: #f0f6fc; padding: 24px; }
    main { width: min(100%, 520px); background: #161b22; border: 1px solid #30363d; border-radius: 20px; padding: 28px; box-shadow: 0 20px 60px rgba(0,0,0,.35); }
    h1 { margin: 0 0 12px; font-size: 25px; }
    p { color: #b1bac4; line-height: 1.55; }
    .actions { display: grid; gap: 12px; margin-top: 22px; }
    button, a { width: 100%; min-height: 48px; border-radius: 12px; border: 0; padding: 13px 16px; font: inherit; font-weight: 700; cursor: pointer; text-align: center; text-decoration: none; }
    #open { background: #238636; color: white; }
    #copy { background: #21262d; color: #f0f6fc; border: 1px solid #30363d; }
    .error { color: #ff7b72; }
    .hint { font-size: 13px; }
  </style>
</head>
<body>
<main>
  <h1>🚀 Подключение в Happ</h1>
  <p id="status">Пытаюсь открыть защищённую подписку…</p>
  <div class="actions">
    <a id="open" href="#" rel="nofollow">Открыть в Happ</a>
    <button id="copy" type="button">Скопировать защищённую ссылку</button>
  </div>
  <p class="hint">Если приложение не открылось автоматически, нажми кнопку выше.</p>
</main>
<script>
(() => {
  "use strict";

  const params = new URLSearchParams(location.search);
  const received = String(params.get("url") || params.get("deeplink") || "").trim();
  const status = document.getElementById("status");
  const openButton = document.getElementById("open");
  const copyButton = document.getElementById("copy");

  const isHappLink = /^happ:\/\/(?:crypt\d+|add)\//i.test(received);
  const isHttpLink = /^https?:\/\//i.test(received);
  const deepLink = isHappLink ? received : (isHttpLink ? `happ://add/${received}` : "");

  if (!deepLink) {
    status.textContent = "Ссылка отсутствует или имеет недопустимый формат.";
    status.classList.add("error");
    openButton.hidden = true;
    copyButton.hidden = true;
    return;
  }

  openButton.href = deepLink;
  status.textContent = /^happ:\/\/crypt\d+\//i.test(deepLink)
    ? "Защищённая подписка готова. Открываю Happ…"
    : "Подписка готова. Открываю Happ…";

  copyButton.addEventListener("click", async () => {
    try {
      await navigator.clipboard.writeText(deepLink);
      copyButton.textContent = "Скопировано ✓";
    } catch {
      const textarea = document.createElement("textarea");
      textarea.value = deepLink;
      textarea.style.position = "fixed";
      textarea.style.opacity = "0";
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand("copy");
      textarea.remove();
      copyButton.textContent = "Скопировано ✓";
    }
  });

  // На iOS/Android автоматический переход на custom scheme иногда блокируется,
  // поэтому остаётся обычная кнопка, которую пользователь нажимает вручную.
  setTimeout(() => {
    location.href = deepLink;
  }, 250);
})();
</script>
</body>
</html>
