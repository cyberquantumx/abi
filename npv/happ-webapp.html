<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Подключение в Happ</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      color-scheme: light dark;
      --bg: var(--tg-theme-bg-color, #0f172a);
      --card: var(--tg-theme-secondary-bg-color, rgba(255, 255, 255, 0.08));
      --text: var(--tg-theme-text-color, #f8fafc);
      --muted: var(--tg-theme-hint-color, #cbd5e1);
      --button: var(--tg-theme-button-color, #38bdf8);
      --button-text: var(--tg-theme-button-text-color, #02131f);
      --danger: #fb7185;
      --border: rgba(255, 255, 255, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .card {
      width: min(480px, 100%);
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--card);
      padding: 22px;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.22);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 24px;
      line-height: 1.15;
    }

    p {
      margin: 0 0 14px;
      line-height: 1.45;
      color: var(--muted);
    }

    textarea {
      width: 100%;
      min-height: 92px;
      resize: none;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.14);
      color: var(--text);
      padding: 13px;
      font: 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      outline: none;
      margin: 8px 0 14px;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 16px;
      padding: 15px 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      color: var(--button-text);
      background: var(--button);
      margin-top: 8px;
    }

    button.secondary {
      color: var(--text);
      background: rgba(127, 127, 127, 0.18);
      border: 1px solid var(--border);
    }

    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }

    .hint {
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
    }

    .error {
      color: var(--danger);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>🚀 Подключение в Happ</h1>
    <p id="description">Нажми кнопку ниже — Telegram попробует открыть Happ и добавить подписку автоматически.</p>

    <textarea id="subscriptionUrl" readonly></textarea>

    <button id="openHapp">Открыть в Happ</button>
    <button id="copyUrl" class="secondary">Скопировать ссылку подписки</button>

    <p class="hint" id="hint">Если Happ не открылся, скопируй ссылку и добавь её вручную как подписку.</p>
  </main>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    const params = new URLSearchParams(window.location.search);
    const subscriptionUrl = (params.get("url") || "").trim();
    const auto = params.get("auto") === "1";

    const urlBox = document.getElementById("subscriptionUrl");
    const openButton = document.getElementById("openHapp");
    const copyButton = document.getElementById("copyUrl");
    const description = document.getElementById("description");
    const hint = document.getElementById("hint");

    function buildHappUrl(url) {
      // Для твоего варианта Happ ждёт raw URL:
      // happ://add/https://domain.ru/abi/subId
      return `happ://add/${url}`;
    }

    function setStatus(text, isError = false) {
      hint.textContent = text;
      hint.className = isError ? "hint error" : "hint";
    }

    async function copySubscriptionUrl() {
      if (!subscriptionUrl) return;

      try {
        await navigator.clipboard.writeText(subscriptionUrl);
        setStatus("Ссылка скопирована. Открой Happ → добавь подписку → вставь ссылку.");
        if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
      } catch (error) {
        urlBox.focus();
        urlBox.select();
        setStatus("Не смог скопировать автоматически. Выдели ссылку выше и скопируй вручную.", true);
      }
    }

    function openHapp() {
      if (!subscriptionUrl) {
        setStatus("Ссылка подписки не передана в WebApp.", true);
        return;
      }

      const happUrl = buildHappUrl(subscriptionUrl);
      setStatus("Открываю Happ. Если ничего не произошло — вернись сюда и нажми “Скопировать”.");
      window.location.href = happUrl;
    }

    if (!subscriptionUrl) {
      description.textContent = "Не удалось открыть подключение.";
      urlBox.value = "Ссылка подписки не передана.";
      openButton.disabled = true;
      copyButton.disabled = true;
      setStatus("Проверь, что бот открывает WebApp с параметром ?url=...", true);
    } else {
      urlBox.value = subscriptionUrl;
      openButton.addEventListener("click", openHapp);
      copyButton.addEventListener("click", copySubscriptionUrl);
      if (auto) setTimeout(openHapp, 500);
    }
  </script>
</body>
</html>
